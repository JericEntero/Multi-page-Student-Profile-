<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
</head>
<body>

    <!-- HEADER SECTION -->
    <header>
        <h1>Contact Me</h1>

        <!-- NAVIGATION LINKS -->
        <nav>
            <a href="ProfilePage.html">Bio</a> |
            <a href="Contact.html">Contact</a>
        </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main>

        <!-- CONTACT FORM SECTION -->
        <section>
            <h2>Send Me a Message</h2>

            <!-- CONTACT FORM -->
            <!-- This form is functional-looking but not connected to a backend -->
            <form action="#" method="post">

                <!-- NAME INPUT -->
                <label for="fullname">Full Name:</label><br>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
                <br><br>

                <!-- EMAIL INPUT -->
                <label for="email">Email Address:</label><br>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
                <br><br>

                <!-- SUBJECT INPUT -->
                <label for="subject">Subject:</label><br>
                <input type="text" id="subject" name="subject" placeholder="Enter your subject">
                <br><br>

                <!-- MESSAGE TEXTAREA -->
                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" cols="30" placeholder="Write your message here" required></textarea>
                <br><br>

                <!-- SUBMIT BUTTON -->
                <button type="submit">Send Message</button>

            </form>
        </section>

        <!-- ADDITIONAL CONTACT INFO -->
        <section>
            <h2>Other Contact Information</h2>

            <article>
                <p>Email: jericjaymejorada@gmail.com</p>
                <p>Location: Philippines, Manila</p>
            </article>
        </section>

    </main>

    <!-- FOOTER SECTION -->
    <footer>
        <p>&copy; 2026 Contact Page. All rights reserved.</p>
    </footer>

</body>
</html>
